                        { title: "Протестът на Великия везир", text: "Високата порта Ви обвинява в намеса във вътрешните работи на империята.", img: "https://istorianasveta.eu/images/osmanska_imperia/divan/Thomas_allom_c1840_The_Enterance_to_Divan.jpg", options: [{ text: "Връчвам остра нота от името на силите.", impact: { prestige: 20, strategy: 15 }, msg: "Дипломатическите отношения са обтегнати до краен предел." }, { text: "Опитвам се да загладя противоречията.", impact: { peace: 20, prestige: -10 }, msg: "Мирът е запазен временно, но на висока цена." }] },
                        { title: "Планът за автономни области", text: "Предстои чертаене на картата на бъдеща България на Цариградската конференция.", img: "https://cdn5.amcn.in/a/granitsi.alle.bg/assets/6e6e2e6bbf68-c999999999/p9fdu5eg1fa1sacuk8k.jpg", options: [{ text: "Подкрепям широка автономия в етническите граници.", impact: { prestige: 25, strategy: 20 }, msg: "Вие поставяте основите на единна българска държава." }, { text: "Предлагам разделяне на две провинции.", impact: { peace: 15, strategy: -10 }, msg: "Компромис, който ще бъде оспорен от историята." }] },
                        { title: "Санкции срещу извършителите", text: "Светът иска наказание за отговорните за жестокостите в Батак и Перущица.", img: "https://defakto.bg/wp-content/uploads/2017/12/%D0%A1%D1%8A%D0%B4%D0%B8%D0%B9%D1%81%D0%BA%D0%BE-%D1%87%D1%83%D0%BA%D1%87%D0%B5-%D0%BF%D0%BB%D1%8E%D1%81-%D1%87%D0%B5%D1%82%D0%B8%D0%B2%D0%B0-1024x576.jpg", options: [{ text: "Настоявам за международен трибунал.", impact: { prestige: 20, strategy: 15 }, msg: "Справедливостта е видима за целия свят." }, { text: "Предлагам само парично обезщетение.", impact: { peace: 10, strategy: -15 }, msg: "Опит за „купуване“ на мира, който е неуспешен." }] },
                        { title: "Натискът на лорд Биконсфилд", text: "Бенджамин Дизраели е скептичен към българската кауза. Трябва да го убедите.", img: "https://upload.wikimedia.org/wikipedia/commons/6/6e/Benjamin_Disraeli%2C_Earl_of_Beaconsfield.jpg", options: [{ text: "Изпращам таен доклад с неоспорими факти.", impact: { strategy: 30, prestige: 15 }, msg: "Променяте мнението на кабинета в Лондон." }, { text: "Присъединявам се към мнението на премиера.", impact: { peace: 10, prestige: -25 }, msg: "Вашата кариера е спасена, но съвестта – не." }] },
                        { title: "Цариградският протокол", text: "Всички велики сили са събрани. Време е за окончателен подпис под реформите.", img: "https://maps.bg/userfiles/editor/image/Tsarigradska-konferencia-maps-bg.jpg", options: [{ text: "Настоявам за железни гаранции за реформи.", impact: { prestige: 25, strategy: 20 }, msg: "Русия вече има повод за военна намеса." }, { text: "Подписвам само символичен документ.", impact: { peace: 15, strategy: -20 }, msg: "Документът остава само на хартия." }] },
                        { title: "Пътят на войната", text: "Дипломацията е изчерпана. Оръжията ще решат съдбата на Балканите.", img: "https://armymedia.bg/wp-content/uploads/2024/03/orajie-vojna.jpg", options: [{ text: "Подготвям почвата за мирната конференция.", impact: { strategy: 40, prestige: 20 }, msg: "Вашият труд ще се види в Сан Стефано." }, { text: "Напускам мисията with разочарование.", impact: { peace: -20, prestige: 10 }, msg: "Оръжията ще довършат това, което перото започна." }] }
                    ]
                }
            }
        };

        let state = { name: '', role: null, step: 0, stats: {} };
        const view = document.getElementById('game-view');
        const header = document.getElementById('game-header');

        const actions = {
            toRoleSelection() {
                const name = document.getElementById('input-name').value.trim();
                if (!name) return;
                state.name = name;
                view.innerHTML = `<div class="p-8 fade-in max-w-5xl mx-auto h-full flex flex-col justify-center"><div class="text-center mb-12"><h2 class="text-3xl font-bold serif text-slate-900 uppercase tracking-widest">Изберете съдба</h2><p class="text-slate-600 italic">Вашето място в историята е тук.</p></div><div class="grid grid-cols-1 md:grid-cols-3 gap-8">${Object.values(DATABASE.roles).map(role => `<div onclick="actions.selectRole('${role.id}')" class="role-card bg-white p-8 rounded-[2rem] cursor-pointer shadow-xl text-center border-b-4 border-slate-200 hover:border-amber-500"><div class="text-6xl mb-6">${role.icon}</div><h3 class="text-2xl font-bold mb-3 serif text-slate-900">${role.name}</h3><p class="text-sm text-slate-500 mb-8 leading-relaxed px-4">${role.desc}</p><button class="bg-slate-900 text-white px-8 py-3 rounded-full text-xs font-bold uppercase tracking-widest">Избери</button></div>`).join('')}</div></div>`;
            },
            selectRole(roleId) {
                state.role = DATABASE.roles[roleId];
                state.stats = { ...state.role.stats };
                state.step = 0;
                document.getElementById('player-role-name').innerText = state.role.name;
                document.getElementById('player-display-name').innerText = state.name;
                header.classList.remove('hidden');
                this.updateStats();
                this.renderStep();
            },
            updateStats() {
                const panel = document.getElementById('stats-panel');
                panel.innerHTML = Object.entries(state.stats).map(([k, v]) => `<div class="w-20 md:w-28"><div class="flex justify-between text-[8px] font-bold text-slate-400 uppercase"><span>${state.role.labels[k]}</span><span>${v}%</span></div><div class="stat-progress"><div class="stat-fill" style="width: ${v}%"></div></div></div>`).join('');
            },
            renderStep() {
                const current = state.role.story[state.step];
                if (!current) return this.renderEnd();
                view.innerHTML = `<div class="p-6 md:p-10 fade-in max-w-4xl mx-auto flex flex-col h-full"><div class="mb-6"><span class="text-[10px] font-black text-amber-600 uppercase tracking-widest">Казус ${state.step + 1} от 10</span><h2 class="text-xl md:text-3xl font-bold serif text-slate-900 mt-1 uppercase">${current.title}</h2></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8"><img src="${current.img}" class="case-image shadow-2xl" onerror="this.src='https://images.unsplash.com/photo-1585829365234-70b094447482?q=80&w=1000&auto=format&fit=crop'"><div class="flex flex-col justify-center"><div class="text-lg leading-relaxed text-slate-800 italic bg-white/60 p-8 rounded-3xl border-l-4 border-amber-600 shadow-sm">"${current.text}"</div></div></div><div class="grid grid-cols-1 gap-4 mt-auto">${current.options.map((opt, i) => `<button onclick="actions.makeChoice(${i})" class="choice-btn w-full text-left p-5 bg-white rounded-2xl shadow-md border border-slate-100 group"><div class="flex items-center gap-5"><div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center font-bold text-slate-400 group-hover:bg-amber-600 group-hover:text-white transition-all shadow-inner">${i + 1}</div><p class="text-slate-900 font-bold serif text-lg">${opt.text}</p></div></button>`).join('')}</div></div>`;
                view.scrollTo(0, 0);
            },
            makeChoice(idx) {
                const choice = state.role.story[state.step].options[idx];
                Object.entries(choice.impact).forEach(([s, v]) => {
                    if (state.stats.hasOwnProperty(s)) {
                        state.stats[s] = Math.max(0, Math.min(100, state.stats[s] + v));
                    }
                });
                this.updateStats();
                view.innerHTML = `<div class="h-full flex items-center justify-center p-6 fade-in"><div class="max-w-xl w-full bg-white p-12 rounded-[3rem] shadow-2xl border-t-8 border-amber-600 text-center"><div class="text-6xl mb-8">🖋️</div><h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Последици</h3><p class="text-2xl serif italic text-slate-900 mb-10 font-bold leading-snug">"${choice.msg}"</p><button onclick="actions.next()" class="w-full bg-slate-950 text-white py-5 rounded-2xl font-bold uppercase tracking-widest shadow-xl hover:bg-slate-800 transition-all">Продължи ➔</button></div></div>`;
            },
            next() { state.step++; this.renderStep(); },
            renderEnd() {
                header.classList.add('hidden');
                const finalStats = Object.entries(state.stats);
                
                view.innerHTML = `<div class="h-full flex items-center justify-center map-bg p-6 text-white text-center"><div class="max-w-3xl w-full bg-slate-950/90 p-12 rounded-[3rem] border border-amber-600/30 backdrop-blur-xl shadow-2xl fade-in"><h2 class="text-4xl md:text-6xl font-bold serif mb-4 text-amber-500 uppercase tracking-tighter">ВАШИЯТ ДЪЛГ Е ИЗПЪЛНЕН</h2><p class="text-xl mb-12 italic text-slate-300">„${state.name}, Вашите избори промениха хода на историята.“</p><div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">${finalStats.map(([k, v]) => `<div class="bg-slate-900/60 p-6 rounded-[2rem] border border-slate-800 shadow-inner group hover:border-amber-500 transition-all"><div class="text-[10px] text-slate-500 font-black uppercase mb-3 tracking-widest">${state.role.labels[k]}</div><div class="text-5xl font-bold text-amber-500 serif group-hover:scale-110 transition-transform">${v}%</div></div>`).join('')}</div><div class="flex flex-col sm:flex-row gap-6 justify-center"><button onclick="actions.generateCertificate()" class="bg-amber-600 hover:bg-amber-500 px-10 py-5 rounded-2xl font-bold uppercase text-sm tracking-widest shadow-lg shadow-amber-900/20 transition-all">📜 Свали Грамота</button><button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 px-10 py-5 rounded-2xl font-bold uppercase text-sm tracking-widest transition-all">Ново начало</button></div></div></div>`;
            },
            generateCertificate() {
                const canvas = document.getElementById('cert-canvas');
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#fcf5e5'; ctx.fillRect(0, 0, 800, 600);
                ctx.strokeStyle = '#b45309'; ctx.lineWidth = 15; ctx.strokeRect(20, 20, 760, 560);
                ctx.textAlign = 'center'; ctx.fillStyle = '#1a1a1a'; ctx.font = 'bold 36px serif'; ctx.fillText('ИСТОРИЧЕСКА ГРАМОТА', 400, 100);
                ctx.font = 'italic 20px serif'; ctx.fillText('С настоящото се признава делото на', 400, 180);
                ctx.font = 'bold 42px serif'; ctx.fillStyle = '#b45309'; ctx.fillText(state.name.toUpperCase(), 400, 250);
                ctx.fillStyle = '#1a1a1a'; ctx.font = '22px serif'; ctx.fillText(`като ${state.role.name} в събитията от 1876 г.`, 400, 310);
                ctx.font = 'bold 28px serif'; ctx.fillText('„Свобода или Смъртъ!“', 400, 450);
                const link = document.createElement('a'); link.download = `1876-${state.name}.png`; link.href = canvas.toDataURL(); link.click();
            }
        };
    </script>
</body>
</html>
